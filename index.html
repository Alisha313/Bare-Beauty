<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bare Beauty</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="popup-overlay">
  <div class="popup-content">
    <h2>Beauty Savings!</h2>
    <p>Tell us what you love, and we'll handle the rest.</p>
    
    <div class="interests">
      <label><input type="checkbox" name="interest" value="skincare"> Skincare</label>
      <label><input type="checkbox" name="interest" value="makeup"> Makeup</label>
      <label><input type="checkbox" name="interest" value="nails"> Press-ons</label>
      <label><input type="checkbox" name="interest" value="tools"> Beauty Tools</label>
    </div>

    <input type="email" placeholder="Enter your email" class="email-input">
    <button class="cta-button">I'm Ready to Glow</button>
   <button class="close-btn" id="maybeLater">I'll Explore on My Own</button>
  </div>
</div>

  <header class="navbar">
  <a href="index.html" class="logo-link">
    <img src="img/logo.png" alt="Bare Beauty Logo" class="site-logo">
  </a>
  
<div class="search-engine">
  <input type="text" placeholder="Search for products" class="search-input">
  <button type="submit" class="search-submit">
    <i class="fa-solid fa-magnifying-glass"></i> </button>
</div>

  <nav>
    <a href="#">Skincare</a>
    <a href="#">Makeup</a>
    <a href="#">Nails</a>
    <a href="#">Tools & Brushes</a>
     <a href="#">Cart</a>
  </nav>
</header> 

  <section class="hero">
    <h2>Bare, Beauty, & Honest</h2>
    <p>Your Skin, Only Better.</p>
    <button>Shop Now</button>
  </section>

  <section class="featured">
    <h3>Featured Products</h3>
    <div class="product-grid">
      <div class="product-card">
        <p>Product Name</p>
      </div>
      <div class="product-card">
        <p>Product Name</p>
      </div>
      <div class="product-card">
        <p>Product Name</p>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 Bare Beauty</p>
  </footer>

</body>
</html>

<script>
  // Find the button and the popup overlay
  const maybeLaterBtn = document.getElementById('maybeLater');
  const popup = document.querySelector('.popup-overlay');

  // When the button is clicked, change the display to 'none'
  maybeLaterBtn.onclick = function() {
    popup.style.display = 'none';
  };
</script>
